<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fe UI - Realtime Kanban</title>
  <meta name="description" content="A demonstration of the Fe UI framework's realtime capabilities.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <!-- The Fe UI Router will mount the entire SPA here -->
  <fe-router></fe-router>

  <!-- Workaround: Set isHydrating true before Router connects to prevent 404 race condition -->
  <script type="module">
    import { globalAuthManager } from '/src/auth.js';
    globalAuthManager.isHydrating = true;
  </script>

  <!-- Load the SPA application bundle -->
  <script type="module" src="/app.js"></script>
</body>
</html>
