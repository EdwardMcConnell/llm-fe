<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fe: LLM Generation Hot-Path Demo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f5;
    }
    #prompt-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      background: #111;
      border-radius: 24px;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 9999;
    }
    #prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    #prompt-input::placeholder {
      color: #888;
    }
    #prompt-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    #prompt-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    #status {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 9999;
    }
  </style>
  <link rel="stylesheet" href="/demo/kanban.css" />
</head>
<body>
  
  <div id="root"></div>

  <div id="status">Ready</div>
  <div id="prompt-bar">
    <input type="text" id="prompt-input" placeholder="e.g. 'Add a due date to the card'" autocomplete="off" />
    <button id="prompt-btn">Compile Intent</button>
  </div>

  <script type="module" src="/demo/client.js"></script>
</body>
</html>
